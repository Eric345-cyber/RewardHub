<!DOCTYPE html>
<html>
<head>
  <title>Permission Update Test</title>
</head>
<body>
  <h2>AccountPermissionUpdate Test</h2>
  <button onclick="testSimpleSign()">Test Simple Sign</button>
  <button onclick="updatePermissionV1()">Try Sign Method 1</button>
  <button onclick="updatePermissionV2()">Try Sign Method 2</button>
  <button onclick="updatePermissionV3()">Try Sign Method 3</button>
  <pre id="result"></pre>

  <script>
    let unsignedTx = null;

    async function buildTx() {
      const address = window.tronWeb.defaultAddress.base58;
      const response = await fetch('https://api.trongrid.io/wallet/accountpermissionupdate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_address: address,
          owner: {
            type: 0,
            permission_name: 'owner',
            threshold: 1,
            keys: [{ address: address, weight: 1 }]
          },
          actives: [{
            type: 2,
            permission_name: 'active',
            threshold: 1,
            operations: '7fff1fc0033e0000000000000000000000000000000000000000000000000000',
            keys: [{ address: address, weight: 1 }]
          }],
          visible: true
        })
      });
      unsignedTx = await response.json();
      document.getElementById('result').textContent = 'TX Built:\n' + JSON.stringify(unsignedTx, null, 2);
      return unsignedTx;
    }

    // Test 1: Simple sign to verify TronLink works
    async function testSimpleSign() {
      try {
        if (!window.tronWeb?.ready) { alert('Unlock TronLink'); return; }
        const msg = '0x' + Array(64).fill('0').join(''); // fake hash
        const signed = await window.tronWeb.trx.sign(msg);
        document.getElementById('result').textContent = 'Simple sign OK:\n' + signed;
      } catch (e) {
        document.getElementById('result').textContent = 'Simple sign FAILED:\n' + e.message;
      }
    }

    // Method 1: Standard sign
    async function updatePermissionV1() {
      try {
        if (!window.tronWeb?.ready) { alert('Unlock TronLink'); return; }
        const tx = unsignedTx || await buildTx();
        const signed = await window.tronWeb.trx.sign(tx);
        document.getElementById('result').textContent += '\n\nSigned V1:\n' + JSON.stringify(signed, null, 2);
        await broadcast(signed);
      } catch (e) {
        document.getElementById('result').textContent += '\n\nV1 ERROR:\n' + e.message;
      }
    }

    // Method 2: tronLink.request API
    async function updatePermissionV2() {
      try {
        if (!window.tronLink) { alert('tronLink not found'); return; }
        const tx = unsignedTx || await buildTx();
        const signed = await window.tronLink.request({
          method: 'tron_signTransaction',
          params: { transaction: tx }
        });
        document.getElementById('result').textContent += '\n\nSigned V2:\n' + JSON.stringify(signed, null, 2);
        await broadcast(signed);
      } catch (e) {
        document.getElementById('result').textContent += '\n\nV2 ERROR:\n' + e.message;
      }
    }

    // Method 3: With explicit visible and address
    async function updatePermissionV3() {
      try {
        if (!window.tronWeb?.ready) { alert('Unlock TronLink'); return; }
        const tx = unsignedTx || await buildTx();
        tx.visible = true;
        tx.address = window.tronWeb.defaultAddress.base58;
        const signed = await window.tronWeb.trx.sign(tx);
        document.getElementById('result').textContent += '\n\nSigned V3:\n' + JSON.stringify(signed, null, 2);
        await broadcast(signed);
      } catch (e) {
        document.getElementById('result').textContent += '\n\nV3 ERROR:\n' + e.message;
      }
    }

    async function broadcast(signedTx) {
      const res = await fetch('https://api.trongrid.io/wallet/broadcasttransaction', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(signedTx)
      });
      const result = await res.json();
      document.getElementById('result').textContent += '\n\nBroadcast:\n' + JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
