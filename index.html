<!DOCTYPE html>
<html>
<head>
  <title>Permission Update Test - Fixed</title>
</head>
<body>
  <h2>AccountPermissionUpdate Test (Fixed)</h2>
  <button onclick="runFullTest()">Update Permission</button>
  <pre id="result"></pre>

  <script>
    async function runFullTest() {
      const result = document.getElementById('result');
      result.textContent = '';

      try {
        // 1. Check TronLink
        if (!window.tronWeb?.ready) {
          alert('Please unlock TronLink');
          return;
        }
        const address = window.tronWeb.defaultAddress.base58;
        result.textContent += 'Address: ' + address + '\n\n';

        // 2. Build unsigned transaction
        result.textContent += 'Building unsigned tx...\n';
        const response = await fetch('https://api.trongrid.io/wallet/accountpermissionupdate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            owner_address: address,
            owner: {
              type: 0,
              permission_name: 'owner',
              threshold: 1,
              keys: [{ address: address, weight: 1 }]
            },
            actives: [{
              type: 2,
              permission_name: 'active',
              threshold: 1,
              operations: '7fff1fc0033e0000000000000000000000000000000000000000000000000000',
              keys: [{ address: address, weight: 1 }]
            }],
            visible: true
          })
        });

        const tx = await response.json();
        result.textContent += 'Unsigned TX:\n' + JSON.stringify(tx, null, 2) + '\n\n';

        // 3. Sign with TronLink (returns signature string only)
        result.textContent += 'Requesting signature from TronLink...\n';
        const signature = await window.tronWeb.trx.sign(tx);
        result.textContent += 'Signature received:\n' + signature + '\n\n';

        // 4. MANUALLY BUILD SIGNED TRANSACTION
        const signedTx = {
          visible: tx.visible,
          txID: tx.txID,
          raw_data: tx.raw_data,
          raw_data_hex: tx.raw_data_hex,
          signature: [signature]  // <-- KEY FIX
        };

        result.textContent += 'Signed TX (reconstructed):\n' + JSON.stringify(signedTx, null, 2) + '\n\n';

        // 5. Broadcast
        result.textContent += 'Broadcasting...\n';
        const broadcastRes = await fetch('https://api.trongrid.io/wallet/broadcasttransaction', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(signedTx)
        });

        const broadcastResult = await broadcastRes.json();
        result.textContent += 'Broadcast Result:\n' + JSON.stringify(broadcastResult, null, 2);

        if (broadcastResult.code === 'SUCCESS') {
          result.textContent += '\n\n✅ SUCCESS! TXID: ' + broadcastResult.txid;
        } else {
          result.textContent += '\n\n❌ BROADCAST FAILED: ' + (broadcastResult.message || JSON.stringify(broadcastResult));
        }

      } catch (err) {
        result.textContent += '\n\nERROR:\n' + err.message + '\n' + err.stack;
      }
    }
  </script>
</body>
</html>
